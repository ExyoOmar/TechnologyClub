<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بلبل الإسراء 2026 | التصويت مغلق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --gold: #c5a059;
            --gold-soft: #fdfaf3;
            --slate-light: #f8fafc;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: #ffffff;
            color: #1e293b;
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, #fffbeb 0%, #ffffff 50%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(197, 160, 89, 0.15);
            border-color: var(--gold);
        }

        .gold-button {
            background: linear-gradient(135deg, #d4af37 0%, #b38f4d 100%);
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }
    </style>
</head>
<body class="hero-gradient">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-quran"></i>
                </div>
                <span class="text-xl font-black text-slate-800 tracking-tight">بلبل <span class="text-amber-600">الإسراء</span></span>
            </div>
            <div id="statusBadge" class="flex items-center gap-2 bg-rose-50 text-rose-700 px-4 py-2 rounded-full border border-rose-100 text-sm font-bold">
                <i class="fas fa-lock"></i>
                التصويت مغلق
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-20 px-6 text-center">
        <div data-aos="fade-down" class="inline-flex items-center gap-2 px-4 py-1 bg-rose-50 rounded-full text-rose-700 text-xs font-black mb-6 border border-rose-100 uppercase tracking-widest">
            <i class="fas fa-clock-rotate-left"></i>
            انتهت الفترة الزمنية لعام 2026
        </div>
        <h1 class="text-5xl md:text-7xl font-black text-slate-900 mb-6 leading-tight" data-aos="fade-up">
            من سيحمل لقب <br> <span class="text-amber-600">بلبل الاسراء؟</span>
        </h1>
        <p class="max-w-2xl mx-auto text-slate-500 text-lg font-medium mb-10" data-aos="fade-up" data-aos-delay="100">
            شكراً لكل من شارك بصوته. لقد تم إغلاق باب التصويت، وسيتم الإعلان عن النتائج الرسمية قريباً عبر منصات المدرسة.
        </p>

        <div class="max-w-xl mx-auto relative" data-aos="fade-up" data-aos-delay="300">
            <i class="fas fa-search absolute right-5 top-1/2 -translate-y-1/2 text-slate-300"></i>
            <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="ابحث عن متسابق..." 
                   class="w-full bg-white border border-slate-200 rounded-2xl py-4 pr-14 pl-6 text-slate-700 focus:ring-4 focus:ring-amber-500/5 focus:border-amber-500 outline-none transition-all shadow-sm">
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
        <div id="candidatesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="bg-slate-50 border-t border-slate-200 py-12 px-6 text-center">
        <p class="text-slate-400 text-sm font-bold">© 2026 مدرسة الإسراء - اللجنة التكنولوجية</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        AOS.init({ duration: 800, once: true });

        const contestants = [
            { id: 1, name: "أحمد الدنا", avatar: "الدنا.png", audio: "أحمد.mp3" },
            { id: 2, name: "أكرم عبدالجواد", avatar: "أكرم.png", audio: "أكرم.mp3" },
            { id: 3, name: "جمال داغر", avatar: "جمال.png", audio: "جمال.mp3" },
            { id: 4, name: "حمزة الشوبكي", avatar: "شوبكي.png", audio: "حمزة.mp3" },
            { id: 5, name: "عبدالرحمن أبو صاع", avatar: "عبد.png", audio: "صاع.mp3" },
            { id: 6, name: "عمرو جيتاوي", avatar: "عمرو.png", audio: "عمرو.mp3" },
            { id: 7, name: "كريم رحيل", avatar: "كريم.png", audio: "كريم.mp3" },
            { id: 8, name: "محمد سروجي", avatar: "سروجي.png", audio: "سروجي.mp3" },
            { id: 9, name: "محمد شلبي", avatar: "شلبي.png", audio: "شلبي.mp3" },
            { id: 10, name: "يزن خضر", avatar: "يزن.png", audio: "يزن.mp3" }
        ];

        function renderCards(data) {
            const grid = document.getElementById('candidatesGrid');
            
            grid.innerHTML = data.map(c => `
                <div class="candidate-card glass-card p-6 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="w-24 h-24 bg-slate-100 rounded-3xl mx-auto mb-6 flex items-center justify-center overflow-hidden border-4 border-white shadow-inner">
                        <img src="${c.avatar}" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="text-center">
                        <h3 class="text-xl font-black text-slate-800 mb-1">${c.name}</h3>
                        <p class="text-slate-400 text-xs font-bold mb-6">مشارك في المرحلة النهائية</p>
                        
                        <div class="flex gap-2">
                            <button onclick="playSample('${c.audio}', '${c.name}')" class="w-12 h-12 rounded-xl bg-slate-50 text-slate-400 hover:bg-amber-50 hover:text-amber-600 transition flex items-center justify-center">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <button onclick="handleClosedVote()" 
                                    class="flex-1 h-12 rounded-xl bg-slate-100 text-slate-400 font-black text-sm cursor-not-allowed transition-all">
                                انتهى التصويت
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function searchNames() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = contestants.filter(c => c.name.includes(query));
            renderCards(filtered);
        }

        let currentAudio = null;

        function playSample(audioSrc, name) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            Swal.fire({
                title: 'مقطع التلاوة',
                html: `
                    <div class="p-4">
                        <p class="mb-4 text-slate-600 font-medium text-right">المتسابق: <span class="text-amber-600 font-bold">${name}</span></p>
                        <audio controls autoplay class="w-full focus:outline-none">
                            <source src="${audioSrc}" type="audio/mpeg">
                        </audio>
                    </div>
                `,
                showConfirmButton: true,
                confirmButtonText: 'إغلاق',
                confirmButtonColor: '#c5a059',
                willClose: () => {
                    const audioEl = Swal.getHtmlContainer().querySelector('audio');
                    if (audioEl) audioEl.pause();
                }
            });
        }

        function handleClosedVote() {
            Swal.fire({
                title: 'عذراً، التصويت مغلق',
                text: 'لقد انتهت الفترة المخصصة للتصويت لهذه المسابقة. ترقبوا النتائج قريباً!',
                icon: 'info',
                confirmButtonText: 'حسناً',
                confirmButtonColor: '#1e293b'
            });
        }

        // Admin Access remains hidden
        let keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if(keys['l'] && keys['m']) {
                Swal.fire({
                    title: 'لوحة التحكم',
                    input: 'password',
                    inputPlaceholder: 'كلمة المرور',
                    confirmButtonColor: '#1e293b'
                }).then(res => {
                    if(res.value === "isra2026") {
                        Swal.fire('أهلاً بك', 'يمكنك مراجعة النتائج النهائية من قاعدة البيانات.', 'success');
                    }
                });
            }
        });
        document.addEventListener('keyup', e => { delete keys[e.key.toLowerCase()]; });

        renderCards(contestants);
    </script>
</body>
</html>
